<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <!-- Background -->
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Door — matching the actual logo, inverted for dark -->
  <g transform="translate(530, 30)">
    <!-- Door frame (right side visible, showing depth) -->
    <path d="M 100,0 L 140,0 L 140,240 L 100,240 Z" fill="#f0f0f0"/>

    <!-- Door panel — ajar, angled left with perspective -->
    <path d="M 30,12 L 100,0 L 100,240 L 30,228 Z" fill="#f0f0f0"/>

    <!-- Inner frame visible through gap -->
    <path d="M 100,0 L 130,4 L 130,236 L 100,240 Z" fill="#0d1117"/>
    <path d="M 118,0 L 140,0 L 140,240 L 118,240 Z" fill="#f0f0f0"/>

    <!-- Doorknob -->
    <circle cx="52" cy="125" r="8" fill="#0d1117"/>
  </g>

  <!-- BLACKDOOR text -->
  <text x="600" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="40" font-weight="500" fill="#f0f6fc" letter-spacing="12">BLACKDOOR</text>

  <!-- INDUSTRIES subtitle - tight spacing -->
  <text x="600" y="362" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#666" letter-spacing="8">INDUSTRIES</text>
</svg>
