<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5319e7"/>
      <stop offset="50%" stop-color="#0052cc"/>
      <stop offset="100%" stop-color="#e99695"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#ffffff"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="300" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="300" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Door motif -->
  <g transform="translate(80, 55)">
    <!-- Door frame -->
    <rect x="0" y="0" width="90" height="160" rx="3" fill="none" stroke="#d0d7de" stroke-width="2"/>
    <!-- Door panel -->
    <rect x="4" y="4" width="68" height="152" rx="2" fill="#f6f8fa"/>
    <!-- Light spill from the gap -->
    <rect x="72" y="4" width="14" height="152" rx="1" fill="#eef1f4"/>
    <rect x="74" y="6" width="8" height="148" fill="#e6eaef"/>
    <!-- Doorknob -->
    <circle cx="62" cy="82" r="5" fill="#d0d7de"/>
    <circle cx="62" cy="82" r="2.5" fill="#8b949e"/>
  </g>

  <!-- Gradient accent line -->
  <rect x="210" y="148" width="420" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Company name -->
  <text x="210" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#1f2328" letter-spacing="3">BLACKDOOR</text>

  <!-- Industries -->
  <text x="214" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#656d76" letter-spacing="12">INDUSTRIES</text>

  <!-- Tagline -->
  <text x="210" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#656d76">AI workforce for autonomous businesses</text>

  <!-- Bottom accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
