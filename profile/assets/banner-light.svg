<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" fill="none">
  <!-- Background -->
  <rect width="1200" height="340" fill="#ffffff"/>

  <!-- Door frame -->
  <g transform="translate(520, 30)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="160" height="220" rx="2" fill="none" stroke="#ccc" stroke-width="3"/>

    <!-- Door panel — slightly ajar -->
    <polygon points="6,6 120,14 120,208 6,214" fill="#f5f5f5"/>

    <!-- Door inner panel detail -->
    <rect x="16" y="30" width="90" height="70" rx="1" fill="none" stroke="#ddd" stroke-width="1.5"/>
    <rect x="16" y="120" width="90" height="70" rx="1" fill="none" stroke="#ddd" stroke-width="1.5"/>

    <!-- Gap -->
    <polygon points="120,14 152,6 152,214 120,208" fill="#eaeaea"/>

    <!-- Doorknob -->
    <circle cx="108" cy="115" r="7" fill="#ccc"/>
    <circle cx="108" cy="115" r="3.5" fill="#1a1a1a"/>
  </g>

  <!-- BLACKDOOR text -->
  <text x="600" y="296" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1a1a1a" letter-spacing="14">BLACKDOOR</text>

  <!-- Thin rule -->
  <line x1="460" y1="312" x2="740" y2="312" stroke="#ccc" stroke-width="1"/>

  <!-- INDUSTRIES subtitle -->
  <text x="600" y="332" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#999" letter-spacing="10">INDUSTRIES</text>
</svg>
